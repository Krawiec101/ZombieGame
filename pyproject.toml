[tool.mutmut]
paths_to_mutate = ["src/app/", "src/core/"]
also_copy = ["src/contracts/", "src/ui/", "src/main.py"]
pytest_add_cli_args_test_selection = ["tests/"]
pytest_add_cli_args = ["-q"]
max_stack_depth = -1
mutate_only_covered_lines = true
do_not_mutate = [
  "src/core/orders.py",
]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F"]
